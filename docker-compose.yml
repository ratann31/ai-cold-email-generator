version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/ai-cold-email
      - JWT_SECRET=super_secret_jwt_key_here
      - EMAIL_USER=your_email@gmail.com
      - EMAIL_PASS=your_email_app_password
      - AI_API_KEY=your_ai_api_key_here
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - server

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
